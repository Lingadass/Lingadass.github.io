name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Generate env-config.js from GitHub Secrets
      #    (the real keys never touch the repository)
      - name: Generate env-config.js from Secrets
        run: |
          cat > env-config.js << 'EOF'
          window.__env__ = {
            FIREBASE_API_KEY:             "${{ secrets.FIREBASE_API_KEY }}",
            FIREBASE_AUTH_DOMAIN:         "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            FIREBASE_PROJECT_ID:          "${{ secrets.FIREBASE_PROJECT_ID }}",
            FIREBASE_STORAGE_BUCKET:      "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            FIREBASE_MESSAGING_SENDER_ID: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            FIREBASE_APP_ID:              "${{ secrets.FIREBASE_APP_ID }}"
          };
          EOF

      # 3. Copy all website assets into dist/
      - name: Assemble dist folder
        run: |
          mkdir -p dist
          # HTML, CSS, JS, config
          cp *.html dist/ 2>/dev/null || true
          cp *.css  dist/ 2>/dev/null || true
          cp *.js   dist/ 2>/dev/null || true
          # Images
          cp *.jpg  dist/ 2>/dev/null || true
          cp *.jpeg dist/ 2>/dev/null || true
          cp *.jfif dist/ 2>/dev/null || true
          cp *.png  dist/ 2>/dev/null || true
          cp *.webp dist/ 2>/dev/null || true
          cp *.gif  dist/ 2>/dev/null || true

      # 4. Deploy dist/ to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./dist
          publish_branch: gh-pages
